<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 700" width="1000" height="700">
  <!-- Room fill -->
  <rect x="0" y="0" width="1000" height="700" fill="#faf9f7" />

  <!-- Room walls -->
  <rect x="20" y="20" width="960" height="660" fill="none" stroke="#c8c0b8" stroke-width="6" />

  <!-- Entrance gap in bottom wall -->
  <rect x="430" y="672" width="140" height="14" fill="#faf9f7" />
  <text x="500" y="696" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#a09890">↓ Entrée</text>

  <!-- Stage (top center) -->
  <rect x="280" y="30" width="440" height="90" rx="4" fill="#ede9e4" stroke="#c8c0b8" stroke-width="1.5" />
  <text x="500" y="72" text-anchor="middle" font-family="sans-serif" font-size="16" fill="#8a8078" letter-spacing="2">SCÈNE</text>
  <text x="500" y="94" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#b0a8a0">Cérémonie · Discours</text>

  <!-- Bar (right side) -->
  <rect x="880" y="180" width="80" height="260" rx="4" fill="#ede9e4" stroke="#c8c0b8" stroke-width="1.5" />
  <text x="920" y="316" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#8a8078" transform="rotate(-90 920 316)" letter-spacing="2">BAR</text>

  <!-- Dance floor (bottom center) -->
  <rect x="260" y="570" width="480" height="100" rx="4" fill="#ede9e4" stroke="#c8c0b8" stroke-width="1.5" stroke-dasharray="6,3" />
  <text x="500" y="617" text-anchor="middle" font-family="sans-serif" font-size="16" fill="#8a8078" letter-spacing="2">PISTE DE DANSE</text>
  <text x="500" y="640" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#b0a8a0">Soirée dansante</text>

  <!-- Subtle grid dots for spatial reference -->
  <pattern id="dots" x="0" y="0" width="60" height="60" patternUnits="userSpaceOnUse">
    <circle cx="30" cy="30" r="1" fill="#d8d0c8" />
  </pattern>
  <rect x="20" y="20" width="960" height="660" fill="url(#dots)" />
</svg>
