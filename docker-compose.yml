services:
  app:
    build: .
    ports:
      - "3000:3000"
      - "5555:5555"
    volumes:
      - .:/app
      - node_modules:/app/node_modules
    environment:
      - DATABASE_URL=file:./dev.db
      - SESSION_SECRET=${SESSION_SECRET}
      - BASE_URL=${BASE_URL:-http://localhost:3000}
      - WATCHPACK_POLLING=true
    command: npm run dev

volumes:
  node_modules:
